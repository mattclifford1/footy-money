# Player name aliases
# Format: alias (lowercase) = Canonical Name
# Add one line per alias. All aliases are case-insensitive.
# Example: samm = Stockman  means "samm", "Samm", "SAMM" all become "Stockman"

[aliases]
sams = stockman
samstockman = stockman
sstocky = stockman
stocky = stockman
samelfs = elfring
samelf = elfring
samcripps = silkins
